<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qual iPhone é pra você?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --accent: #c8f0ff;
    --accent2: #7dd3f8;
    --accent3: #ffd6a5;
    --text: #f0f0f5;
    --muted: #7a7a90;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  .glow-orb { position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; opacity:0.15; }
  .glow-orb.one { width:600px; height:600px; background:#1a6fff; top:-200px; right:-100px; }
  .glow-orb.two { width:400px; height:400px; background:#7b2fff; bottom:-100px; left:-100px; }
  .app { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:48px 24px 80px; min-height:100vh; display:flex; flex-direction:column; }
  .header { text-align:center; margin-bottom:52px; animation:fadeUp 0.6s ease both; }
  .logo-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(200,240,255,0.07); border:1px solid rgba(200,240,255,0.15); border-radius:100px; padding:6px 16px; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent2); margin-bottom:28px; font-weight:500; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(36px,7vw,56px); font-weight:900; line-height:1.05; letter-spacing:-0.02em; margin-bottom:16px; }
  h1 em { font-style:normal; background:linear-gradient(135deg,var(--accent),var(--accent2),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { color:var(--muted); font-size:16px; line-height:1.6; max-width:440px; margin:0 auto; font-weight:300; }
  .progress-wrap { margin-bottom:36px; animation:fadeUp 0.6s 0.1s ease both; }
  .progress-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:10px; font-weight:500; letter-spacing:0.04em; }
  .progress-track { height:3px; background:var(--surface2); border-radius:100px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent2),#a78bfa); border-radius:100px; transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:36px; margin-bottom:16px; animation:fadeUp 0.5s ease both; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(200,240,255,0.2),transparent); }
  .question-num { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent2); font-weight:600; margin-bottom:14px; }
  .question-text { font-family:'Playfair Display',serif; font-size:clamp(20px,4vw,26px); font-weight:700; line-height:1.3; margin-bottom:28px; letter-spacing:-0.01em; }
  .question-icon { font-size:32px; margin-bottom:12px; display:block; }
  .options { display:flex; flex-direction:column; gap:10px; }
  .option { display:flex; align-items:flex-start; gap:14px; padding:16px 18px; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; cursor:pointer; transition:all 0.2s ease; text-align:left; width:100%; position:relative; overflow:hidden; }
  .option:hover { border-color:rgba(125,211,248,0.3); background:rgba(125,211,248,0.05); transform:translateX(3px); }
  .option.selected { border-color:var(--accent2); background:rgba(125,211,248,0.08); }
  .option.selected::after { content:'✓'; position:absolute; right:16px; top:50%; transform:translateY(-50%); width:22px; height:22px; background:var(--accent2); color:var(--bg); border-radius:50%; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .option-icon { font-size:22px; flex-shrink:0; margin-top:1px; }
  .option-label { font-size:15px; font-weight:500; color:var(--text); line-height:1.3; margin-bottom:3px; }
  .option-desc { font-size:13px; color:var(--muted); font-weight:300; line-height:1.4; }
  .actions { display:flex; gap:12px; margin-top:8px; animation:fadeUp 0.5s 0.1s ease both; }
  .btn { font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; border:none; border-radius:12px; padding:15px 28px; cursor:pointer; transition:all 0.2s ease; letter-spacing:0.02em; }
  .btn-primary { background:linear-gradient(135deg,var(--accent2),#a78bfa); color:#000; flex:1; }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(125,211,248,0.25); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost { background:transparent; border:1.5px solid var(--border); color:var(--muted); padding:15px 20px; }
  .btn-ghost:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
  .result-screen { animation:fadeUp 0.7s ease both; }
  .result-hero { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:40px 36px; margin-bottom:20px; text-align:center; position:relative; overflow:hidden; }
  .result-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(125,211,248,0.08) 0%,transparent 70%); }
  .result-img { width:160px; height:160px; object-fit:contain; margin:0 auto 16px; display:block; border-radius:16px; }
  .result-img-placeholder { width:100px; height:100px; margin:0 auto 16px; font-size:72px; line-height:1; display:flex; align-items:center; justify-content:center; animation:bounce 0.6s ease both; }
  .result-tag { display:inline-block; background:rgba(200,240,255,0.08); border:1px solid rgba(200,240,255,0.15); border-radius:100px; padding:5px 14px; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent2); font-weight:600; margin-bottom:16px; }
  .result-model { font-family:'Playfair Display',serif; font-size:clamp(24px,5vw,40px); font-weight:900; letter-spacing:-0.02em; margin-bottom:12px; line-height:1.1; }
  .result-model span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .result-desc { font-size:15px; color:var(--muted); line-height:1.65; max-width:480px; margin:0 auto 24px; font-weight:300; }
  .buy-buttons { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .buy-btn { display:inline-flex; align-items:center; gap:8px; padding:12px 20px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; text-decoration:none; transition:all 0.2s; }
  .buy-btn-primary { background:linear-gradient(135deg,var(--accent2),#a78bfa); color:#000; }
  .buy-btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(125,211,248,0.3); }
  .buy-btn-secondary { background:var(--surface2); border:1.5px solid var(--border); color:var(--text); }
  .buy-btn-secondary:hover { border-color:rgba(255,255,255,0.2); }
  .specs-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  @media(max-width:500px){.specs-grid{grid-template-columns:1fr;} .buy-buttons{flex-direction:column;}}
  .spec-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; }
  .spec-card h4 { font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:12px; }
  .spec-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
  .spec-list li { font-size:13px; color:var(--text); font-weight:400; display:flex; align-items:flex-start; gap:8px; line-height:1.4; }
  .spec-list li::before { content:attr(data-icon); flex-shrink:0; font-size:14px; }
  .source-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; background:rgba(125,211,248,0.08); border:1px solid rgba(125,211,248,0.15); border-radius:100px; font-size:11px; color:var(--accent2); margin-bottom:20px; }
  .btn-restart { width:100%; background:transparent; border:1.5px solid var(--border); color:var(--muted); border-radius:12px; padding:15px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .btn-restart:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
  .loading-card { display:flex; align-items:center; justify-content:center; gap:14px; padding:32px; color:var(--muted); font-size:15px; }
  .spinner { width:20px; height:20px; border:2px solid rgba(125,211,248,0.2); border-top-color:var(--accent2); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  .slide-in { animation:fadeUp 0.4s ease both; }
  @media(max-width:480px){.app{padding:32px 16px 60px;} .card{padding:24px;} .result-hero{padding:32px 24px;}}
</style>
</head>
<body>
<div class="glow-orb one"></div>
<div class="glow-orb two"></div>
<div class="app" id="app">
  <div class="header" id="intro-header">
    <div class="logo-badge"><span>🍎</span> Guia iPhone</div>
    <h1>Qual iPhone é<br><em>realmente</em> pra você?</h1>
    <p class="subtitle">Responda 7 perguntas e descubra o modelo ideal pro seu estilo de uso e orçamento — sem pagar mais caro do que precisa.</p>
  </div>
  <div class="progress-wrap" id="progress-section" style="display:none">
    <div class="progress-meta">
      <span id="progress-label">Pergunta 1 de 7</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="question-area"></div>
  <div class="actions" id="actions-area" style="display:none">
    <button class="btn btn-ghost" id="btn-back" onclick="goBack()">← Voltar</button>
    <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>Continuar →</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIGURAÇÃO — Cole aqui a URL CSV do Google Sheets
//  Arquivo → Compartilhar → Publicar na web → CSV → Copiar URL
// ─────────────────────────────────────────────────────────────
const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/1r31PXmTNkwc8YPUHgBTmod47RY8eYJk9iFBylrvCfIM/pub?gid=0&single=true&output=csv';

// ─── Perguntas ────────────────────────────────────────────────
const questions = [
  {
    id:'budget', icon:'💰', text:'Qual é o seu orçamento aproximado?',
    options:[
      {icon:'🟢', label:'Até R$ 3.500',          desc:'Quero o melhor custo-benefício',              value:'low'},
      {icon:'🟡', label:'R$ 3.500 a R$ 6.000',   desc:'Disposto a investir um pouco mais',            value:'mid'},
      {icon:'🔵', label:'R$ 6.000 a R$ 9.000',   desc:'Quero um top de linha acessível',              value:'high'},
      {icon:'🟣', label:'Acima de R$ 9.000',      desc:'O melhor do mercado, sem compromisso',         value:'premium'},
    ]
  },
  {
    id:'uso', icon:'📱', text:'Como você usa o celular no dia a dia?',
    options:[
      {icon:'💬', label:'Básico',                  desc:'WhatsApp, redes sociais, chamadas, vídeos',   value:'basic'},
      {icon:'📸', label:'Foco em fotos e vídeos',  desc:'Registro de momentos, viagens, conteúdo',      value:'photo'},
      {icon:'🎮', label:'Games e performance',      desc:'Jogos pesados, apps exigentes, multitarefa',  value:'gaming'},
      {icon:'💼', label:'Trabalho e produtividade', desc:'Apps profissionais, edição, videoconferências',value:'work'},
    ]
  },
  {
    id:'camera', icon:'📷', text:'O que você espera da câmera?',
    options:[
      {icon:'🤳', label:'Selfies e uso casual',         desc:'Fotos do dia a dia com boa qualidade',         value:'selfie'},
      {icon:'🌅', label:'Fotos bonitas sem complicar',  desc:'Resultados automáticos incríveis',             value:'good'},
      {icon:'🎬', label:'Câmera profissional',           desc:'Zoom óptico, Pro Mode, vídeo 4K avançado',    value:'pro'},
      {icon:'😐', label:'Câmera não é prioridade',       desc:'Uso só pra registro básico',                   value:'none'},
    ]
  },
  {
    id:'tela', icon:'🖥️', text:'Que tipo de tela você prefere?',
    options:[
      {icon:'📱', label:'Compacta e fácil de segurar', desc:'Cabe no bolso, uso com uma mão',                value:'small'},
      {icon:'📲', label:'Tamanho padrão',               desc:'Equilibrado entre tamanho e praticidade',       value:'medium'},
      {icon:'🖼️', label:'Grande para conteúdo',         desc:'Filmes, jogos, leitura, produtividade',         value:'large'},
    ]
  },
  {
    id:'bateria', icon:'🔋', text:'Como é sua relação com bateria?',
    options:[
      {icon:'😌', label:'Carrego o dia normal',         desc:'Uso moderado, sem preocupação',                 value:'light'},
      {icon:'🌍', label:'Fico longe do carregador',     desc:'Preciso aguentar o dia inteiro com uso intenso',value:'heavy'},
      {icon:'🗺️', label:'Viajo muito',                  desc:'Preciso de muita autonomia e confiabilidade',   value:'travel'},
    ]
  },
  {
    id:'tecnologia', icon:'⚡', text:'Recursos avançados importam pra você?',
    options:[
      {icon:'🙂', label:'Não muito',                    desc:'O básico bem feito já me satisfaz',             value:'no'},
      {icon:'🔍', label:'Dynamic Island e ProMotion',   desc:'Tela 120Hz suave e notificações inteligentes',  value:'display'},
      {icon:'💻', label:'USB-C e conectividade pro',    desc:'Transferência rápida, acessórios, armazenamento',value:'connect'},
      {icon:'🤖', label:'Apple Intelligence (IA)',       desc:'Recursos de IA exclusivos dos modelos recentes',value:'ai'},
    ]
  },
  {
    id:'longevidade', icon:'🕐', text:'Por quanto tempo planeja usar o aparelho?',
    options:[
      {icon:'🔄', label:'1 a 2 anos',     desc:'Costumo trocar com frequência',            value:'short'},
      {icon:'📅', label:'3 a 4 anos',     desc:'Quero que dure bem e continue rápido',     value:'medium'},
      {icon:'🏆', label:'5 anos ou mais', desc:'Quero o melhor pra aguentar muito tempo',  value:'long'},
    ]
  },
];



// ─── State ────────────────────────────────────────────────────
let answers = {};
let current = -1;
let history = [];
let sheetsData = null; // loaded from Google Sheets

// ─── Parse CSV ────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted fields with commas
    const cols = [];
    let cur = ''; let inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').replace(/^"|"$/g, ''); });
    return obj;
  });
}

async function loadSheetsData() {
  if (!SHEETS_CSV_URL || SHEETS_CSV_URL === 'SUA_URL_AQUI') return;
  try {
    const resp = await fetch(SHEETS_CSV_URL);
    const text = await resp.text();
    sheetsData = parseCSV(text);
  } catch(e) {
    console.warn('Planilha não carregada, usando algoritmo interno.', e);
  }
}

function lookupSheets() {
  if (!sheetsData) return null;
  const key = `${answers.budget}|${answers.uso}|${answers.camera}|${answers.tela}|${answers.bateria}|${answers.tecnologia}|${answers.longevidade}`;
  const row = sheetsData.find(r => {
    const rKey = `${r.budget}|${r.uso}|${r.camera}|${r.tela}|${r.bateria}|${r.tecnologia}|${r.longevidade}`;
    return rKey === key;
  });
  return row || null;
}

// ─── Render Intro ─────────────────────────────────────────────
function renderIntro() {
  document.getElementById('question-area').innerHTML = `
    <div class="card slide-in" style="text-align:center">
      <div class="loading-card" id="loading-indicator" style="display:${SHEETS_CSV_URL !== 'SUA_URL_AQUI' ? 'flex' : 'none'}">
        <div class="spinner"></div>
        <span>Carregando indicações personalizadas…</span>
      </div>
      <p style="color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:24px;font-weight:300;">
        São apenas <strong style="color:var(--text)">7 perguntas rápidas</strong> sobre como você usa o celular, quanto quer investir e o que realmente importa pra você. Sem tecniquês, sem enrolação.
      </p>
      <button class="btn btn-primary" style="width:100%;font-size:16px;padding:18px" onclick="startQuiz()" id="start-btn">
        Começar agora →
      </button>
    </div>`;
  document.getElementById('actions-area').style.display = 'none';
  document.getElementById('progress-section').style.display = 'none';
}

async function initApp() {
  renderIntro();
  if (SHEETS_CSV_URL !== 'SUA_URL_AQUI') {
    await loadSheetsData();
    const ind = document.getElementById('loading-indicator');
    if (ind) ind.style.display = 'none';
  }
}

function startQuiz() {
  current = 0;
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('actions-area').style.display = 'flex';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const selected = answers[q.id];
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progress-label').textContent = `Pergunta ${current+1} de ${questions.length}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('btn-back').style.display = current === 0 ? 'none' : 'block';
  document.getElementById('btn-next').disabled = !selected;

  document.getElementById('question-area').innerHTML = `
    <div class="card slide-in">
      <span class="question-num">Pergunta ${current+1}</span>
      <span class="question-icon">${q.icon}</span>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map(opt=>`
          <button class="option${selected===opt.value?' selected':''}" onclick="selectOption('${q.id}','${opt.value}')">
            <span class="option-icon">${opt.icon}</span>
            <div class="option-content">
              <div class="option-label">${opt.label}</div>
              <div class="option-desc">${opt.desc}</div>
            </div>
          </button>`).join('')}
      </div>
    </div>`;
}

function selectOption(qId, value) {
  answers[qId] = value;
  document.getElementById('btn-next').disabled = false;
  renderQuestion();
}

function goNext() {
  if (current < questions.length - 1) {
    history.push(current); current++;
    renderQuestion();
  } else { showResult(); }
}

function goBack() {
  if (history.length > 0) { current = history.pop(); renderQuestion(); }
}

// ─── Result ───────────────────────────────────────────────────
function showResult() {
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('actions-area').style.display = 'none';
  document.getElementById('intro-header').style.display = 'none';

  const sheetRow = lookupSheets();

  if (!sheetRow) {
    document.getElementById('question-area').innerHTML = `
      <div class="result-screen">
        <div class="result-hero" style="text-align:center">
          <div style="font-size:56px;margin-bottom:16px">🤔</div>
          <div class="result-model" style="font-size:24px;margin-bottom:12px"><span>Combinação não encontrada</span></div>
          <p class="result-desc">Essa combinação de respostas ainda não está na planilha. Tente refazer o quiz com outras escolhas.</p>
        </div>
        <button class="btn-restart" onclick="restartQuiz()">↺ Refazer o questionário</button>
      </div>`;
    return;
  }

  const model  = sheetRow['modelo_indicado'] || '—';
  const desc   = sheetRow['descricao']       || '';
  const pros   = (sheetRow['pros']   || '').split(';').map(s=>s.trim()).filter(Boolean);
  const cons   = (sheetRow['contras']|| '').split(';').map(s=>s.trim()).filter(Boolean);
  const imgUrl = sheetRow['imagem_url']   || '';
  const link1  = sheetRow['link_compra_1']|| '';
  const link2  = sheetRow['link_compra_2']|| '';

  const imgHtml = imgUrl
    ? `<img src="${imgUrl}" alt="${model}" class="result-img" onerror="this.style.display='none'">`
    : `<div class="result-img-placeholder">📱</div>`;

  const prosHtml = pros.length
    ? pros.map(p=>`<li data-icon="→">${p}</li>`).join('')
    : '<li data-icon="→">Verificar detalhes do modelo</li>';

  const consHtml = cons.length
    ? cons.map(c=>`<li data-icon="·">${c}</li>`).join('')
    : '<li data-icon="·">—</li>';

  const buyHtml = (link1 || link2) ? `
    <div class="buy-buttons">
      ${link1 ? `<a href="${link1}" target="_blank" rel="noopener" class="buy-btn buy-btn-primary">🛒 Comprar agora</a>` : ''}
      ${link2 ? `<a href="${link2}" target="_blank" rel="noopener" class="buy-btn buy-btn-secondary">🔗 Ver opção 2</a>` : ''}
    </div>` : '';

  const sourceBadge = `<div style="text-align:center;margin-bottom:16px"><span class="source-badge">✦ Indicação personalizada</span></div>`;

  document.getElementById('question-area').innerHTML = `
    <div class="result-screen">
      ${sourceBadge}
      <div class="result-hero">
        ${imgHtml}
        <div class="result-tag">✦ Sua recomendação</div>
        <div class="result-model"><span>${model}</span></div>
        <p class="result-desc">${desc}</p>
        ${buyHtml}
      </div>
      <div class="specs-grid">
        <div class="spec-card">
          <h4>✅ Pontos fortes</h4>
          <ul class="spec-list">${prosHtml}</ul>
        </div>
        <div class="spec-card">
          <h4>⚠️ Limitações</h4>
          <ul class="spec-list">${consHtml}</ul>
        </div>
      </div>
      <button class="btn-restart" onclick="restartQuiz()">↺ Refazer o questionário</button>
    </div>`;
}

function restartQuiz() {
  answers = {}; history = []; current = -1;
  document.getElementById('intro-header').style.display = 'block';
  document.getElementById('progress-fill').style.width = '0%';
  renderIntro();
  // Reload sheets if configured
  if (SHEETS_CSV_URL !== 'SUA_URL_AQUI') loadSheetsData();
}

initApp();
</script>

</body>
